name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PROVIDER_NAME: beyondtrust-secretsafe
  DOTNET_VERSION: '10.0'

jobs:
  build:
    name: Build ${{ matrix.os }}_${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      matrix:
        include:
          # Linux (glibc — compatible with Debian/Ubuntu/RHEL based images; also runs on Alpine via gcompat)
          - { os: linux,   arch: amd64, rid: linux-x64,        platform: linux/amd64,  runner: ubuntu-latest,    use_qemu: false }
          - { os: windows, arch: amd64, rid: win-x64,          runner: windows-latest, use_qemu: false }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux ──────────────────────────────────────────────────────────────

      - name: Set up QEMU (cross-build)
        if: matrix.use_qemu
        uses: docker/setup-qemu-action@v3

      # Build inside Debian 12 (bookworm, glibc 2.36) for maximum runtime compatibility.
      # Linking against an older glibc lets the binary also run on newer distros (Ubuntu,
      # Debian 13, RHEL 9+) and on Alpine when `gcompat` + `openssl` are installed.
      - name: Build via Debian bookworm Docker (Native AOT / glibc 2.36)
        if: matrix.os == 'linux'
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            debian:bookworm-slim \
            sh -c "
              set -e && \
              apt-get update -qq && \
              apt-get install -y -qq --no-install-recommends ca-certificates curl clang zlib1g-dev libssl-dev && \
              curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel ${DOTNET_VERSION} --install-dir /usr/share/dotnet && \
              /usr/share/dotnet/dotnet publish BeyondTrust.SecretSafeProvider/BeyondTrust.SecretSafeProvider.csproj \
                -c Release \
                -r ${{ matrix.rid }} \
                -o /src/dist/${{ matrix.os }}_${{ matrix.arch }} \
                -p:PublishAot=true \
                -p:StaticExecutable=false \
                --self-contained true
            "

      # ── macOS / Windows ────────────────────────────────────────────────────

      - name: Setup .NET SDK
        if: matrix.os != 'linux'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build (macOS / Windows Native AOT)
        if: matrix.os != 'linux'
        shell: bash
        run: |
          dotnet publish BeyondTrust.SecretSafeProvider/BeyondTrust.SecretSafeProvider.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            -o dist/${{ matrix.os }}_${{ matrix.arch }} \
            -p:PublishAot=true \
            --self-contained true

      # ── Package ────────────────────────────────────────────────────────────

      - name: Package binary into zip (Linux / macOS)
        if: matrix.os != 'windows'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY="terraform-provider-${PROVIDER_NAME}"
          ZIPNAME="${BINARY}_${VERSION}_${{ matrix.os }}_${{ matrix.arch }}.zip"

          cp "dist/${{ matrix.os }}_${{ matrix.arch }}/${BINARY}" "${BINARY}"
          zip "${ZIPNAME}" "${BINARY}"
          rm "${BINARY}"
          echo "Built: ${ZIPNAME}"

      - name: Package binary into zip (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $binary  = "terraform-provider-$env:PROVIDER_NAME"
          $zipName = "${binary}_${version}_${{ matrix.os }}_${{ matrix.arch }}.zip"
          $src     = "dist\${{ matrix.os }}_${{ matrix.arch }}\${binary}.exe"

          Compress-Archive -Path $src -DestinationPath $zipName
          Write-Host "Built: $zipName"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: provider-${{ matrix.os }}-${{ matrix.arch }}
          path: "*.zip"
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          # continue even if no artifacts exist (all builds may have failed)
          pattern: 'provider-*'

      - name: Check for artifacts
        id: check
        run: |
          if ls *.zip 2>/dev/null | grep -q .; then
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
            echo "No zip artifacts found — skipping release."
          fi

      - name: Generate SHA256SUMS
        if: steps.check.outputs.has_artifacts == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SUMS_FILE="terraform-provider-${PROVIDER_NAME}_${VERSION}_SHA256SUMS"
          sha256sum *.zip > "${SUMS_FILE}"
          cat "${SUMS_FILE}"

      - name: Import GPG key
        if: steps.check.outputs.has_artifacts == 'true'
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign SHA256SUMS
        if: steps.check.outputs.has_artifacts == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SUMS_FILE="terraform-provider-${PROVIDER_NAME}_${VERSION}_SHA256SUMS"
          gpg --batch --yes --detach-sign "${SUMS_FILE}"
          ls -la "${SUMS_FILE}"*

      - name: Create GitHub Release
        if: steps.check.outputs.has_artifacts == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *_SHA256SUMS
            *_SHA256SUMS.sig
          generate_release_notes: true
          fail_on_unmatched_files: false
